// ─── 환율 유틸 ────────────────────────────────────────────────────
const RATES_CACHE_KEY    = "sell2ndhand_rates";
const RATES_CACHE_TTL_MS = 60 * 60 * 1000;

async function fetchRates() {
  try {
    const cached = localStorage.getItem(RATES_CACHE_KEY);
    if (cached) {
      const { ts, rates } = JSON.parse(cached);
      if (Date.now() - ts < RATES_CACHE_TTL_MS) return rates;
    }
  } catch (_) {}
  try {
    const resp = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await resp.json();
    const rates = { USD: 1, KRW: data.rates.KRW, ZAR: data.rates.ZAR };
    localStorage.setItem(RATES_CACHE_KEY, JSON.stringify({ ts: Date.now(), rates }));
    return rates;
  } catch (_) { return null; }
}

function convertPrice(amount, fromCurrency, toCurrency, rates) {
  if (!rates || !amount) return amount || 0;
  if (fromCurrency === toCurrency) return amount;
  const from = rates[fromCurrency] || 1;
  const to   = rates[toCurrency]   || 1;
  return (amount / from) * to;
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error(`요청 시간 초과 (${ms/1000}초) — 네트워크를 확인하세요`)), ms)
    )
  ]);
}

// ─── 이미지 리사이즈 유틸 ─────────────────────────────────────────
async function resizeImageToBlob(file, targetBytes = 200 * 1024) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement("canvas");
      let { width, height } = img;
      const MAX_DIM = 1000;
      if (width > MAX_DIM)  { height = Math.round(height * MAX_DIM / width);  width  = MAX_DIM; }
      if (height > MAX_DIM) { width  = Math.round(width  * MAX_DIM / height); height = MAX_DIM; }
      canvas.width  = width;
      canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const tryQ = q => new Promise(res => canvas.toBlob(b => res(b), "image/jpeg", q));
      (async () => {
        for (const q of [0.80, 0.65, 0.50, 0.35]) {
          const blob = await tryQ(q);
          if (blob.size <= targetBytes || q === 0.35) { resolve(blob); return; }
        }
      })();
    };
    img.onerror = reject;
    img.src = url;
  });
}

async function uploadPhotos(itemId, slots) {
  const results = [];
  for (let i = 0; i < slots.length; i++) {
    const slot = slots[i];
    if (slot.type === "url")   { results.push(slot.value); continue; }
    if (slot.type !== "file")  { continue; }
    const blob = await resizeImageToBlob(slot.value);
    const ref  = storage.ref(`items/${itemId}/photo_${i}_${Date.now()}.jpg`);
    const snap = await ref.put(blob, { contentType: "image/jpeg" });
    results.push(await snap.ref.getDownloadURL());
  }
  return results;
}

// ─── 사진 업로더 ─────────────────────────────────────────────────
function PhotoUploader({ initialUrls=[], onChange, itemId=null }) {
  const initSlots = () => {
    const s = (initialUrls||[]).slice(0,4).map(url => ({ type:"url", value:url, preview:url }));
    while (s.length < 4) s.push({ type:"empty", value:null, preview:null });
    return s;
  };
  const [slots, setSlots] = useState(initSlots);
  const labels = ["대표사진","사진2","사진3","사진4"];

  useEffect(() => {
    const next = initSlots();
    setSlots(next);
  }, [JSON.stringify(initialUrls)]);

  const handleFile = (idx, file) => {
    if (!file) return;
    const preview = URL.createObjectURL(file);
    const next = slots.map((s,i) => i===idx ? { type:"file", value:file, preview } : s);
    setSlots(next);
    onChange && onChange(next);
  };
  const handleRemove = (idx) => {
    const next = slots.map((s,i) => i===idx ? { type:"empty", value:null, preview:null } : s);
    setSlots(next);
    onChange && onChange(next);
  };

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
      {slots.map((slot, i) => (
        <div key={i} style={{ position:"relative", width:"100%", height:120 }}>
          {slot.type !== "empty" ? (
            <>
              <img src={slot.preview} alt="" style={{ width:"100%", height:120, objectFit:"cover", borderRadius:10, border:"1px solid #ede8e1" }} />
              <button onClick={() => handleRemove(i)} style={{ position:"absolute", top:4, right:4, background:"rgba(0,0,0,0.55)", border:"none", borderRadius:99, width:24, height:24, cursor:"pointer", color:"#fff", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>×</button>
            </>
          ) : (
            <label style={{ cursor:"pointer", display:"block", width:"100%", height:"100%" }}>
              <PhotoPlaceholder label={labels[i]} size="100%" style={{ width:"100%", height:120 }} />
              <input type="file" accept="image/*" style={{ display:"none" }} onChange={e => handleFile(i, e.target.files[0])} />
            </label>
          )}
        </div>
      ))}
    </div>
  );
}

function ListScreen({ items, onSelect, onAdd, categories, currency, rates }) {
  const [catFilter, setCatFilter] = useState("전체");
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("최신순");

  const filtered = items
    .filter(i => catFilter === "전체" || i.category === catFilter)
    .filter(i => i.title.includes(search) || i.category.includes(search))
    .sort((a, b) => {
      if (sortBy === "가격높은순") return b.price - a.price;
      if (sortBy === "가격낮은순") return a.price - b.price;
      return 0;
    });

  const totalValue = items.reduce((s, i) =>
    s + convertPrice(i.price || 0, i.currency || "KRW", currency, rates), 0);

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <div style={{ padding:"14px 16px 0", background:"#faf8f5" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:12 }}>
          <div>
            <div style={{ fontSize:11, color:"#aaa", fontWeight:600, marginBottom:2 }}>중고물품 관리</div>
            <div style={{ fontSize:22, fontWeight:800, color:"#1a1a1a", letterSpacing:-0.5 }}>내 물품 목록</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:10, color:"#aaa" }}>예상 총 수익</div>
              <div style={{ fontSize:16, fontWeight:800, color:"#c0392b" }}>{formatPrice(Math.round(totalValue), currency)}</div>
            </div>
            <button onClick={() => onAdd()} style={{ background:"#c0392b", color:"#fff", border:"none", borderRadius:12, padding:"8px 14px", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:5, whiteSpace:"nowrap" }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              등록
            </button>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", background:"#fff", border:"1px solid #ede8e1", borderRadius:12, padding:"8px 12px", gap:8, marginBottom:10 }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#bbb" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="물품 검색..." style={{ flex:1, border:"none", outline:"none", fontSize:14, background:"transparent", color:"#1a1a1a" }}/>
        </div>
        <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:10 }}>
          {["전체", ...categories].map(c => (
            <button key={c} onClick={() => setCatFilter(c)} style={{ padding:"5px 12px", borderRadius:20, border:"1.5px solid", borderColor:catFilter===c?"#c0392b":"#e2ddd7", background:catFilter===c?"#c0392b":"#fff", color:catFilter===c?"#fff":"#666", fontSize:12, fontWeight:600, whiteSpace:"nowrap", cursor:"pointer", transition:"all 0.15s" }}>{c}</button>
          ))}
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingBottom:8 }}>
          <span style={{ fontSize:12, color:"#aaa" }}>{filtered.length}개 물품</span>
          <div style={{ display:"flex", gap:4 }}>
            {["최신순","가격높은순","가격낮은순"].map(s => (
              <button key={s} onClick={() => setSortBy(s)} style={{ padding:"3px 8px", borderRadius:8, border:"1px solid", borderColor:sortBy===s?"#c0392b":"#e2ddd7", background:sortBy===s?"#fff5f5":"transparent", color:sortBy===s?"#c0392b":"#aaa", fontSize:10, fontWeight:600, cursor:"pointer" }}>{s}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"0 16px 16px" }}>
        {filtered.map(item => (
          <div key={item.id} onClick={() => onSelect(item)} style={{ background:"#fff", borderRadius:16, marginBottom:10, border:"1px solid #ede8e1", overflow:"hidden", cursor:"pointer", display:"flex", boxShadow:"0 1px 4px rgba(0,0,0,0.04)", transition:"transform 0.1s" }}
            onMouseDown={e => e.currentTarget.style.transform="scale(0.98)"}
            onMouseUp={e => e.currentTarget.style.transform="scale(1)"}
            onTouchStart={e => e.currentTarget.style.transform="scale(0.98)"}
            onTouchEnd={e => e.currentTarget.style.transform="scale(1)"}
          >
            <div style={{ width:88, height:88, flexShrink:0, background:"#f5f0ea", display:"flex", alignItems:"center", justifyContent:"center", position:"relative", overflow:"hidden" }}>
              {item.photos && item.photos[0]
                ? <img src={item.photos[0]} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                : <span style={{ fontSize:32 }}>{categoryIcon(item.category)}</span>}
              {item.sellPriority === "높음" && (
                <div style={{ position:"absolute", top:6, left:6, background:"#ef4444", borderRadius:6, padding:"1px 5px", fontSize:9, color:"#fff", fontWeight:700 }}>긴급</div>
              )}
            </div>
            <div style={{ flex:1, padding:"10px 12px", minWidth:0 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:4 }}>
                <div style={{ fontSize:14, fontWeight:700, color:"#1a1a1a", lineHeight:1.3, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.title}</div>
                <div style={{ fontSize:14, fontWeight:800, color:"#c0392b", whiteSpace:"nowrap" }}>{formatPrice(item.price, item.currency||"KRW")}</div>
              </div>
              <div style={{ display:"flex", gap:5, marginTop:5, flexWrap:"wrap" }}>
                <Tag color={statusColor(item.status)} label={item.status} />
                <Tag color="#8b7355" label={item.category} />
                <Tag color="#6b7280" label={item.location} />
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:6 }}>
                <div style={{ fontSize:11, color:"#aaa" }}>관심자 {(item.leads||[]).length}명</div>
                <div style={{ fontSize:10, color:storedColor(storedVal(item.stored)), fontWeight:700 }}>{storedIcon(storedVal(item.stored))} {storedVal(item.stored)}</div>
              </div>
            </div>
          </div>
        ))}
        {filtered.length === 0 && (
          <div style={{ textAlign:"center", padding:"48px 0", color:"#ccc" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>📦</div>
            <div style={{ fontSize:14, fontWeight:600 }}>등록된 물품이 없습니다</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── 상세 화면 ────────────────────────────────────────────────────
function DetailScreen({ item, onBack, onUpdate, onDelete, categories, locations, currency }) {
  const [tab, setTab] = useState("info");
  const [li, setLi] = useState(item);

  useEffect(() => { setLi(item); }, [item.id]);

  const upd = (field, val) => { const u = {...li, [field]:val}; setLi(u); onUpdate(u); };
  const updCl = (field, val) => { const u = {...li, checklist:{...li.checklist, [field]:val}}; setLi(u); onUpdate(u); };
  const saveInfoTab = (draft) => { setLi(draft); onUpdate(draft); };

  const TABS = [
    { id:"info",    label:"기본정보" },
    { id:"leads",   label:`관심자 ${(li.leads||[]).length}` },
    { id:"selling", label:"판매준비" },
  ];

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <div style={{ background:"#fff", borderBottom:"1px solid #ede8e1" }}>
        <div style={{ display:"flex", alignItems:"center", padding:"12px 16px", gap:12 }}>
          <button onClick={onBack} style={{ border:"none", background:"none", cursor:"pointer", padding:4, color:"#1a1a1a" }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15,18 9,12 15,6"/></svg>
          </button>
          <div style={{ flex:1, fontSize:15, fontWeight:700, color:"#1a1a1a", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{li.title}</div>
          <Tag color={statusColor(li.status)} label={li.status} />
        </div>
        <div style={{ display:"flex", paddingLeft:8 }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ padding:"8px 14px", border:"none", background:"none", cursor:"pointer", fontSize:13, fontWeight:700, color:tab===t.id?"#c0392b":"#bbb", borderBottom:`2.5px solid ${tab===t.id?"#c0392b":"transparent"}`, transition:"all 0.15s" }}>{t.label}</button>
          ))}
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:16 }}>
        {tab==="info"    && <InfoTab    item={li} onSave={saveInfoTab} onDelete={onDelete} onBack={onBack} categories={categories} locations={locations} currency={currency} />}
        {tab==="leads"   && <LeadsTab   item={li} upd={upd} currency={li.currency||currency} />}
        {tab==="selling" && <SellingTab item={li} upd={upd} updCl={updCl} currency={li.currency||currency} />}
      </div>
    </div>
  );
}

function InfoTab({ item, onSave, onDelete, onBack, categories, locations, currency }) {
  const [draft, setDraft]           = useState({...item});
  const [pendingSlots, setPending]  = useState(null);
  const [saving, setSaving]         = useState(false);
  const [progress, setProgress]     = useState({ pct:0, label:"" });
  const [errorMsg, setErrorMsg]     = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const set = (k, v) => setDraft(d => ({...d, [k]: v}));
  const cur = draft.currency || currency;

  const handlePhotoChange = (slots) => setPending(slots);

  const handleSave = async () => {
    if (saving) return;
    setSaving(true);
    setErrorMsg(null);
    const bump = (pct, label) => setProgress({ pct, label });
    try {
      const fileSlots = pendingSlots ? pendingSlots.filter(s => s.type === "file") : [];
      const hasFiles  = fileSlots.length > 0;
      let photos = draft.photos || [];

      if (pendingSlots !== null) {
        if (hasFiles) {
          const n = fileSlots.length;
          let done = 0, urls = [];
          for (let i = 0; i < pendingSlots.length; i++) {
            const slot = pendingSlots[i];
            if (slot.type === "url")  { urls.push(slot.value); continue; }
            if (slot.type !== "file") { continue; }
            bump(Math.round(10 + (done/n)*30), `사진 압축 중... (${done+1}/${n})`);
            const blob = await resizeImageToBlob(slot.value);
            bump(Math.round(40 + (done/n)*35), `사진 업로드 중... (${done+1}/${n})`);
            const ref  = storage.ref(`items/${item.id}/photo_${i}_${Date.now()}.jpg`);
            const snap = await withTimeout(ref.put(blob, { contentType:"image/jpeg" }), 45000);
            urls.push(await snap.ref.getDownloadURL());
            done++;
          }
          photos = urls;
        } else {
          photos = pendingSlots.filter(s => s.type === "url").map(s => s.value);
        }
      }

      const hasFiles2 = pendingSlots ? pendingSlots.some(s => s.type==="file") : false;
      bump(hasFiles2 ? 80 : 50, "정보 저장 중...");
      await onSave({...draft, photos, price:Number(draft.price)||0, year:Number(draft.year)||0});
      bump(100, "저장 완료! ✅");
      setTimeout(() => { setSaving(false); setProgress({pct:0,label:""}); setPending(null); }, 700);
    } catch(e) {
      setErrorMsg(e.message || "저장 중 오류가 발생했습니다.");
      setProgress({ pct:0, label:"" });
      setSaving(false);
    }
  };

  const hasNewPhotos = pendingSlots ? pendingSlots.some(s => s.type==="file") : false;
  const progressSteps = hasNewPhotos
    ? [{ label:"사진 처리", done: progress.pct>=40 }, { label:"사진 업로드", done: progress.pct>=75 }, { label:"저장 완료", done: progress.pct>=100 }]
    : [{ label:"정보 저장",  done: progress.pct>=50 }, { label:"저장 완료", done: progress.pct>=100 }];

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      <div>
        <SectionLabel>사진 (최대 4장)</SectionLabel>
        <PhotoUploader initialUrls={draft.photos||[]} onChange={handlePhotoChange} itemId={item.id} />
      </div>
      <Card>
        <SectionLabel>분류</SectionLabel>
        <Row label="카테고리">
          <select value={draft.category} onChange={e => set("category",e.target.value)} style={{...selStyle,width:"auto"}}>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
        </Row>
        <Row label="상태">
          <div style={{ display:"flex", gap:5 }}>
            {STATUS_OPTIONS.map(s => (
              <button key={s} onClick={() => set("status",s)} style={{ padding:"4px 8px", borderRadius:20, border:"1.5px solid", borderColor:draft.status===s?statusColor(s):"#e2ddd7", background:draft.status===s?statusColor(s)+"18":"#fff", color:draft.status===s?statusColor(s):"#999", fontSize:11, fontWeight:700, cursor:"pointer" }}>{s}</button>
            ))}
          </div>
        </Row>
        <Row label="위치">
          <select value={draft.location} onChange={e => set("location",e.target.value)} style={{...selStyle,width:"auto"}}>
            {locations.map(l => <option key={l}>{l}</option>)}
          </select>
        </Row>
        <Row label="보관 상태">
          <div style={{ display:"flex", gap:5 }}>
            {STORED_OPTIONS.map(s => (
              <button key={s} onClick={() => set("stored",s)} style={{ padding:"4px 8px", borderRadius:20, border:"1.5px solid", borderColor:storedVal(draft.stored)===s?storedColor(s):"#e2ddd7", background:storedVal(draft.stored)===s?storedColor(s)+"18":"#fff", color:storedVal(draft.stored)===s?storedColor(s):"#999", fontSize:11, fontWeight:700, cursor:"pointer" }}>{s}</button>
            ))}
          </div>
        </Row>
      </Card>
      <Card>
        <SectionLabel>가격 정보</SectionLabel>
        <Row label="통화">
          <select value={cur} onChange={e => set("currency",e.target.value)} style={{...selStyle,width:"auto"}}>
            {Object.entries(CURRENCIES).map(([k,v]) => <option key={k} value={k}>{v.symbol} {v.code} ({v.label})</option>)}
          </select>
        </Row>
        <Row label="희망가격">
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:13, color:"#888", fontWeight:700 }}>{CURRENCIES[cur]?.symbol}</span>
            <input value={draft.price} onChange={e => set("price", e.target.value)} onBlur={e => set("price", Number(e.target.value))} style={{...iStyle,width:120,textAlign:"right"}} type="number" />
          </div>
        </Row>
        <Row label="시장가 메모">
          <input value={draft.marketMemo||""} onChange={e => set("marketMemo",e.target.value)} style={{...iStyle,width:160}} placeholder="시세 참고..." />
        </Row>
      </Card>
      <Card>
        <SectionLabel>제품 정보</SectionLabel>
        <Row label="브랜드"><input value={draft.brand||""} onChange={e => set("brand",e.target.value)} style={{...iStyle,width:160}} placeholder="브랜드명..." /></Row>
        <Row label="구매연도"><input value={draft.year||""} onChange={e => set("year",e.target.value)} style={{...iStyle,width:100}} type="number" placeholder="연도..." /></Row>
        <Row label="크기"><input value={draft.dimensions||""} onChange={e => set("dimensions",e.target.value)} style={{...iStyle,width:160}} placeholder="예) 120×80cm" /></Row>
        <Row label="무게"><input value={draft.weight||""} onChange={e => set("weight",e.target.value)} style={{...iStyle,width:120}} placeholder="예) 5kg" /></Row>
        <Row label="상태 메모">
          <input value={draft.condition||""} onChange={e => set("condition",e.target.value)} style={{...iStyle,width:160}} placeholder="특이사항..." />
        </Row>
      </Card>
      <Card>
        <SectionLabel>판매 우선순위</SectionLabel>
        <div style={{ display:"flex", gap:8 }}>
          {PRIORITY_OPTIONS.map(p => (
            <button key={p} onClick={() => set("sellPriority",p)} style={{ flex:1, padding:"9px 0", borderRadius:10, border:"1.5px solid", borderColor:draft.sellPriority===p?priorityColor(p):"#e2ddd7", background:draft.sellPriority===p?priorityColor(p)+"15":"#fff", color:draft.sellPriority===p?priorityColor(p):"#bbb", fontSize:13, fontWeight:700, cursor:"pointer" }}>{p}</button>
          ))}
        </div>
      </Card>
      <Card>
        <SectionLabel>메모</SectionLabel>
        <textarea value={draft.memo||""} onChange={e => set("memo",e.target.value)} style={{...iStyle,height:72,resize:"none"}} placeholder="기타 참고사항..." />
      </Card>
      {errorMsg && (
        <div style={{ background:"#fff5f5", border:"1.5px solid #fca5a5", borderRadius:12, padding:"12px 14px", fontSize:13, color:"#ef4444", fontWeight:600, textAlign:"center", lineHeight:1.6 }}>⚠️ {errorMsg}</div>
      )}
      {saving ? (
        <div style={{ background:"#fff", borderRadius:14, padding:"18px 16px", border:"1px solid #ede8e1" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <span style={{ fontSize:14, fontWeight:700, color:"#1a1a1a" }}>{progress.label || "처리 중..."}</span>
            <span style={{ fontSize:14, fontWeight:800, color:progress.pct===100?"#22c55e":"#c0392b" }}>{progress.pct}%</span>
          </div>
          <div style={{ background:"#f0ece6", borderRadius:99, height:10, overflow:"hidden" }}>
            <div style={{ width:`${progress.pct}%`, height:"100%", borderRadius:99, transition:"width 0.4s ease", background:progress.pct===100?"#22c55e":"linear-gradient(90deg,#c0392b,#e74c3c)" }} />
          </div>
          <div style={{ display:"flex", gap:8, marginTop:14 }}>
            {progressSteps.map((s,i) => (
              <div key={i} style={{ flex:1, textAlign:"center" }}>
                <div style={{ width:24, height:24, borderRadius:99, margin:"0 auto 4px", display:"flex", alignItems:"center", justifyContent:"center", background:s.done?"#22c55e":"#f0ece6", border:`2px solid ${s.done?"#22c55e":"#d1c9bc"}`, transition:"all 0.3s" }}>
                  {s.done ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20,6 9,17 4,12"/></svg> : <div style={{ width:8, height:8, borderRadius:99, background:"#d1c9bc" }} />}
                </div>
                <div style={{ fontSize:9, color:s.done?"#22c55e":"#bbb", fontWeight:700 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      ) : (
        <button onClick={handleSave} style={{ width:"100%", padding:"14px", background:"#c0392b", color:"#fff", border:"none", borderRadius:14, fontSize:15, fontWeight:800, cursor:"pointer" }}>저장</button>
      )}
      <div style={{ paddingTop:8, borderTop:"1px solid #f0ece6" }}>
        {!confirmDelete ? (
          <button onClick={() => setConfirmDelete(true)} style={{ width:"100%", padding:"13px", border:"1.5px solid #fca5a5", borderRadius:14, background:"#fff", color:"#ef4444", fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/></svg>
            이 물품 삭제
          </button>
        ) : (
          <div style={{ background:"#fff5f5", border:"1.5px solid #fca5a5", borderRadius:14, padding:"16px" }}>
            <div style={{ fontSize:14, fontWeight:700, color:"#1a1a1a", marginBottom:4 }}>정말 삭제하시겠어요?</div>
            <div style={{ fontSize:12, color:"#888", marginBottom:14 }}><span style={{ fontWeight:700, color:"#ef4444" }}>"{item.title}"</span> 물품과 관련된 모든 정보가 영구 삭제됩니다.</div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setConfirmDelete(false)} style={{ flex:1, padding:"11px", border:"1.5px solid #e2ddd7", borderRadius:10, background:"#fff", color:"#666", fontSize:13, fontWeight:700, cursor:"pointer" }}>취소</button>
              <button onClick={() => { onDelete(item.id); onBack(); }} style={{ flex:1, padding:"11px", border:"none", borderRadius:10, background:"#ef4444", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>삭제 확인</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function LeadsTab({ item, upd, currency }) {
  const [showAdd, setShowAdd] = useState(false);
  const [nl, setNl] = useState({ name:"", contact:"", priority:"보통", offer:"", note:"" });
  const [editId, setEditId] = useState(null);
  const [editData, setEditData] = useState(null);
  const addLead = () => {
    if (!nl.name.trim()) return;
    upd("leads", [...(item.leads||[]), {...nl, id:Date.now(), offer:Number(nl.offer)}]);
    setNl({ name:"", contact:"", priority:"보통", offer:"", note:"" });
    setShowAdd(false);
  };
  const delLead = id => upd("leads", (item.leads||[]).filter(l => l.id !== id));
  const saveLead = () => {
    upd("leads", (item.leads||[]).map(l => l.id===editId ? {...editData, offer:Number(editData.offer)||0} : l));
    setEditId(null); setEditData(null);
  };
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontSize:14, fontWeight:700, color:"#1a1a1a" }}>관심자 목록</span>
        <button onClick={() => setShowAdd(s => !s)} style={{ background:"#c0392b", color:"#fff", border:"none", borderRadius:10, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>+ 추가</button>
      </div>
      {showAdd && (
        <Card>
          <SectionLabel>새 관심자 추가</SectionLabel>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>

function AddScreen({ onAdd, onBack, categories, locations, currency, onAddCategory, onAddLocation }) {
  const [form, setForm] = useState({
    title:"", category:categories[0]||"기타", status:"양호",
    location:locations[0]||"거실", price:"", currency,
    marketMemo:"", condition:"", brand:"", year:"",
    dimensions:"", weight:"", memo:"", sellPriority:"보통", stored:"보관중"
  });
  const [photoSlots, setPhotoSlots] = useState([
    {type:"empty",value:null,preview:null},{type:"empty",value:null,preview:null},
    {type:"empty",value:null,preview:null},{type:"empty",value:null,preview:null}
  ]);
  const [submitting, setSubmitting] = useState(false);
  const [progress, setProgress]     = useState({ pct: 0, label: "" });
  const [errorMsg, setErrorMsg]     = useState(null);
  const set = (k,v) => setForm(f => ({...f,[k]:v}));

  const submit = async () => {
    if (!form.title.trim() || submitting) return;
    setSubmitting(true);
    setErrorMsg(null);

    const fileSlots  = photoSlots.filter(s => s.type === "file");
    const totalSteps = fileSlots.length > 0 ? 3 : 2;
    let step = 0;
    const bump = (pct, label) => { step++; setProgress({ pct, label }); };

    try {
      const newRef    = db.collection("items").doc();
      let photoUrls   = [];

      if (fileSlots.length > 0) {
        let done = 0;
        for (let i = 0; i < photoSlots.length; i++) {
          const slot = photoSlots[i];
          if (slot.type === "url")   { photoUrls.push(slot.value); continue; }
          if (slot.type !== "file")  { continue; }
          const n = fileSlots.length;
          bump(Math.round(10 + (done / n) * 30), `사진 압축 중... (${done+1}/${n})`);
          const blob = await resizeImageToBlob(slot.value);
          bump(Math.round(40 + (done / n) * 35), `사진 업로드 중... (${done+1}/${n})`);
          const ref  = storage.ref(`items/${newRef.id}/photo_${i}_${Date.now()}.jpg`);
          const snap = await withTimeout(ref.put(blob, { contentType:"image/jpeg" }), 45000);
          photoUrls.push(await snap.ref.getDownloadURL());
          done++;
        }
      }

      bump(fileSlots.length > 0 ? 80 : 50, "정보 저장 중...");
      await withTimeout(newRef.set({
        ...form,
        price:  Number(form.price) || 0,
        year:   Number(form.year)  || new Date().getFullYear(),
        photos: photoUrls,
        leads:  [],
        checklist: { upload:false, contact:false, negotiate:false, prepare:false },
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }), 15000);

      setProgress({ pct: 100, label: "등록 완료! ✅" });
      setTimeout(onAdd, 700);
    } catch(e) {
      console.error("submit error:", e);
      setErrorMsg(e.message || "등록 중 오류가 발생했습니다. 다시 시도해주세요.");
      setProgress({ pct: 0, label: "" });
      setSubmitting(false);
    }
  };

  const cur = form.currency;
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <div style={{ display:"flex", alignItems:"center", padding:"14px 16px", background:"#fff", borderBottom:"1px solid #ede8e1", gap:12 }}>
        <button onClick={onBack} style={{ border:"none", background:"none", cursor:"pointer", padding:4, color:"#1a1a1a" }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15,18 9,12 15,6"/></svg>
        </button>
        <div style={{ flex:1, fontSize:17, fontWeight:800, color:"#1a1a1a" }}>물품 등록</div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:16, display:"flex", flexDirection:"column", gap:14 }}>
        <Card>
          <SectionLabel>사진 (최대 4장)</SectionLabel>
          <PhotoUploader initialUrls={[]} onChange={setPhotoSlots} />
        </Card>
        <Card>
          <SectionLabel>기본 정보</SectionLabel>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div>
              <label style={lStyle}>제목 *</label>
              <input value={form.title} onChange={e => set("title",e.target.value)} style={iStyle} placeholder="물품 이름을 입력하세요" />
            </div>
            <div>
              <label style={lStyle}>카테고리</label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:2 }}>
                {categories.map(c => (
                  <button key={c} onClick={() => set("category",c)} style={{ padding:"5px 11px", borderRadius:20, border:"1.5px solid", borderColor:form.category===c?"#c0392b":"#e2ddd7", background:form.category===c?"#fff5f5":"#fff", color:form.category===c?"#c0392b":"#888", fontSize:12, fontWeight:600, cursor:"pointer" }}>{c}</button>
                ))}
              </div>
              <AddCustomInput placeholder="카테고리 직접 추가..." onAdd={name => { onAddCategory(name); set("category",name); }} />
            </div>
            <div>
              <label style={lStyle}>상태</label>
              <div style={{ display:"flex", gap:6 }}>
                {STATUS_OPTIONS.map(s => (
                  <button key={s} onClick={() => set("status",s)} style={{ flex:1, padding:"9px 0", borderRadius:10, border:"1.5px solid", borderColor:form.status===s?statusColor(s):"#e2ddd7", background:form.status===s?statusColor(s)+"18":"#fff", color:form.status===s?statusColor(s):"#bbb", fontSize:12, fontWeight:700, cursor:"pointer" }}>{s}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={lStyle}>위치</label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:2 }}>
                {locations.map(l => (
                  <button key={l} onClick={() => set("location",l)} style={{ padding:"5px 11px", borderRadius:20, border:"1.5px solid", borderColor:form.location===l?"#c0392b":"#e2ddd7", background:form.location===l?"#fff5f5":"#fff", color:form.location===l?"#c0392b":"#888", fontSize:12, fontWeight:600, cursor:"pointer" }}>{l}</button>
                ))}
              </div>
              <AddCustomInput placeholder="위치 직접 추가..." onAdd={name => { onAddLocation(name); set("location",name); }} />
            </div>
          </div>
        </Card>
        <Card>
          <SectionLabel>가격 정보</SectionLabel>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            <div>
              <label style={lStyle}>통화</label>
              <select value={cur} onChange={e => set("currency",e.target.value)} style={selStyle}>
                {Object.entries(CURRENCIES).map(([k,v]) => <option key={k} value={k}>{v.symbol} {v.code} — {v.label}</option>)}
              </select>
            </div>
            <div>
              <label style={lStyle}>희망 판매가</label>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:16, fontWeight:700, color:"#888", width:20 }}>{CURRENCIES[cur]?.symbol}</span>
                <input value={form.price} onChange={e => set("price",e.target.value)} style={iStyle} type="number" placeholder="0" />
              </div>
            </div>
            <div>
              <label style={lStyle}>참고 시장가 메모</label>
              <input value={form.marketMemo} onChange={e => set("marketMemo",e.target.value)} style={iStyle} placeholder="당근·중고나라 시세, 링크 등..." />
            </div>
          </div>
        </Card>
        <Card>
          <SectionLabel>제품 세부 정보</SectionLabel>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            <div style={{ display:"flex", gap:8 }}>
              <div style={{ flex:1 }}><label style={lStyle}>브랜드</label><input value={form.brand} onChange={e => set("brand",e.target.value)} style={iStyle} placeholder="제조사" /></div>
              <div style={{ flex:1 }}><label style={lStyle}>구매연도</label><input value={form.year} onChange={e => set("year",e.target.value)} style={iStyle} placeholder="2022" type="number" /></div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <div style={{ flex:1 }}><label style={lStyle}>크기/치수</label><input value={form.dimensions} onChange={e => set("dimensions",e.target.value)} style={iStyle} placeholder="예) 120×80cm" /></div>
              <div style={{ flex:1 }}><label style={lStyle}>무게</label><input value={form.weight} onChange={e => set("weight",e.target.value)} style={iStyle} placeholder="예) 5kg" /></div>
            </div>
            <div><label style={lStyle}>상태 메모</label><input value={form.condition} onChange={e => set("condition",e.target.value)} style={iStyle} placeholder="스크래치, 파손 등 특이사항" /></div>
          </div>
        </Card>
        <Card>
          <SectionLabel>판매 설정</SectionLabel>
          <Row label="판매 우선순위">
            <div style={{ display:"flex", gap:5 }}>
              {PRIORITY_OPTIONS.map(p => (
                <button key={p} onClick={() => set("sellPriority",p)} style={{ padding:"5px 9px", borderRadius:10, border:"1.5px solid", borderColor:form.sellPriority===p?priorityColor(p):"#e2ddd7", background:form.sellPriority===p?priorityColor(p)+"15":"#fff", color:form.sellPriority===p?priorityColor(p):"#bbb", fontSize:12, fontWeight:700, cursor:"pointer" }}>{p}</button>
              ))}
            </div>
          </Row>
        </Card>
        <Card>
          <label style={lStyle}>메모</label>
          <textarea value={form.memo} onChange={e => set("memo",e.target.value)} style={{...iStyle,height:72,resize:"none"}} placeholder="기타 참고사항..." />
        </Card>
        {errorMsg && (
          <div style={{ background:"#fff5f5", border:"1.5px solid #fca5a5", borderRadius:12, padding:"12px 14px", fontSize:13, color:"#ef4444", fontWeight:600, textAlign:"center", lineHeight:1.6 }}>
            ⚠️ {errorMsg}
          </div>
        )}

        {submitting ? (
          <div style={{ background:"#fff", borderRadius:14, padding:"18px 16px", border:"1px solid #ede8e1" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <span style={{ fontSize:14, fontWeight:700, color:"#1a1a1a" }}>{progress.label || "처리 중..."}</span>
              <span style={{ fontSize:14, fontWeight:800, color: progress.pct === 100 ? "#22c55e" : "#c0392b" }}>{progress.pct}%</span>
            </div>
            <div style={{ background:"#f0ece6", borderRadius:99, height:10, overflow:"hidden" }}>
              <div style={{ width:`${progress.pct}%`, height:"100%", borderRadius:99, transition:"width 0.4s ease",
                background: progress.pct === 100 ? "#22c55e" : "linear-gradient(90deg,#c0392b,#e74c3c)" }} />
            </div>
            <div style={{ display:"flex", gap:8, marginTop:14 }}>
              {(photoSlots.some(s => s.type==="file") ? [
                { label:"사진 처리",  done: progress.pct >= 40 },
                { label:"사진 업로드", done: progress.pct >= 75 },
                { label:"저장 완료",  done: progress.pct >= 100 },
              ] : [
                { label:"정보 저장",  done: progress.pct >= 50 },
                { label:"저장 완료",  done: progress.pct >= 100 },
              ]).map((s,i) => (
                <div key={i} style={{ flex:1, textAlign:"center" }}>
                  <div style={{ width:24, height:24, borderRadius:99, margin:"0 auto 4px", display:"flex", alignItems:"center", justifyContent:"center",
                    background: s.done ? "#22c55e" : "#f0ece6", border:`2px solid ${s.done?"#22c55e":"#d1c9bc"}`, transition:"all 0.3s" }}>
                    {s.done
                      ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20,6 9,17 4,12"/></svg>
                      : <div style={{ width:8, height:8, borderRadius:99, background:"#d1c9bc" }} />}
                  </div>
                  <div style={{ fontSize:9, color: s.done ? "#22c55e" : "#bbb", fontWeight:700 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <button onClick={submit} style={{ background:form.title.trim()?"#c0392b":"#ddd", color:"#fff", border:"none", borderRadius:14, padding:"15px", fontSize:15, fontWeight:800, cursor:form.title.trim()?"pointer":"default", transition:"background 0.2s", letterSpacing:-0.2 }}>
            등록
          </button>
        )}
      </div>
    </div>
  );
}

// ─── 메인 앱 ──────────────────────────────────────────────────────
function App({ user }) {
  const [items, setItems]           = useState([]);
  const [tab, setTab]               = useState("list");
  const [selected, setSelected]     = useState(null);
  const [toast, setToast]           = useState(null);
  const [currency, setCurrencyState] = useState(() => localStorage.getItem("sell2ndhand_currency") || "KRW");
  const setCurrency = (c) => { setCurrencyState(c); localStorage.setItem("sell2ndhand_currency", c); };
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [locations, setLocations]   = useState(DEFAULT_LOCATIONS);
  const [rates, setRates]           = useState(null);
  const [loading, setLoading]       = useState(true);

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  useEffect(() => {
    const unsubItems = db.collection("items").orderBy("createdAt","desc")
      .onSnapshot(snap => {
        setItems(snap.docs.map(d => ({ id:d.id, ...d.data() })));
        setLoading(false);
      }, () => setLoading(false));
    const unsubSettings = db.collection("settings").doc("config")
      .onSnapshot(snap => {
        if (snap.exists) {
          const d = snap.data();
          if (d.categories && d.categories.length) setCategories(d.categories);
          if (d.locations  && d.locations.length)  setLocations(d.locations);
        }
      });
    return () => { unsubItems(); unsubSettings(); };
  }, []);

  useEffect(() => { fetchRates().then(setRates); }, []);

  useEffect(() => {
    if (!selected) return;
    const fresh = items.find(i => i.id === selected.id);
    if (fresh) setSelected(fresh);
  }, [items]);

  const updateItem = async (updated) => {
    setSelected(updated);
    const { id, ...data } = updated;
    await db.collection("items").doc(id).update({
      ...data,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  };

  const addItem = () => {
    showToast("✅ 물품이 등록되었습니다");
    setTab("list");
  };

  const deleteItem = async (id) => {
    const item = items.find(i => i.id === id);
    if (item && item.photos && item.photos.length) {
      await Promise.all(item.photos.map(url => storage.refFromURL(url).delete().catch(()=>{})));
    }
    await db.collection("items").doc(id).delete();
  };

  const addCategory = (name) => {
    db.collection("settings").doc("config").set(
      { categories: firebase.firestore.FieldValue.arrayUnion(name) }, { merge:true }
    );
  };
  const addLocation = (name) => {
    db.collection("settings").doc("config").set(
      { locations: firebase.firestore.FieldValue.arrayUnion(name) }, { merge:true }
    );
  };

  const handleSignOut = () => auth.signOut();

  let screen;
  if (loading) {
    screen = (
      <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12 }}>
        <div style={{ width:32, height:32, border:"3px solid #f0ece6", borderTop:"3px solid #c0392b", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
        <div style={{ fontSize:13, color:"#aaa" }}>데이터 불러오는 중...</div>
      </div>
    );
  } else if (selected) {
    screen = <DetailScreen item={selected} onBack={() => setSelected(null)} onUpdate={updateItem} onDelete={deleteItem} categories={categories} locations={locations} currency={currency} />;
  } else if (tab === "add") {
    screen = <AddScreen onAdd={addItem} onBack={() => setTab("list")} categories={categories} locations={locations} currency={currency} onAddCategory={addCategory} onAddLocation={addLocation} />;
  } else if (tab === "checklist") {
    screen = <ChecklistScreen items={items} currency={currency} />;
  } else {
    screen = <ListScreen items={items} onSelect={setSelected} onAdd={() => setTab("add")} categories={categories} currency={currency} rates={rates} />;
  }

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", fontFamily:"Noto Sans KR, -apple-system, sans-serif" }}>
      <div style={{ background:"#fff", padding:"12px 16px", borderBottom:"1px solid #ede8e1", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <img src="/icon-192.png" alt="" style={{ width:30, height:30, borderRadius:9, objectFit:"cover" }} />
          <span style={{ fontSize:16, fontWeight:800, color:"#1a1a1a", letterSpacing:-0.5 }}>Sell2ndHand</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <CurrencyPicker currency={currency} onChange={setCurrency} />
          <button onClick={handleSignOut} style={{ background:"#f5f0ea", border:"none", borderRadius:20, padding:"5px 10px", fontSize:11, fontWeight:700, color:"#888", cursor:"pointer" }}>로그아웃</button>
        </div>
      </div>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>{screen}</div>
      {!selected && tab !== "add" && <TabBar tab={tab} setTab={setTab} />}
      {!selected && tab !== "add" && (
        <div style={{ textAlign:"center", padding:"10px 16px 14px", borderTop:"1px solid #ede8e1", background:"#faf8f5" }}>
          <div style={{ fontSize:10, color:"#ccc", fontWeight:500, lineHeight:1.8 }}>
            Copyright © 2026, shaun.yoo.ao All rights reserved.<br/>Version 1.0.2
          </div>
        </div>
      )}
      {toast && (
        <div style={{ position:"fixed", bottom:80, left:"50%", transform:"translateX(-50%)", background:"#1a1a1a", color:"#fff", borderRadius:12, padding:"10px 20px", fontSize:13, fontWeight:600, whiteSpace:"nowrap", boxShadow:"0 4px 24px rgba(0,0,0,0.25)", animation:"fadeUp 0.25s ease", zIndex:999 }}>{toast}</div>
      )}
    </div>
  );
}

// ─── 루트 (인증 상태 관리) ────────────────────────────────────────
function Root() {
  const [user, setUser]           = useState(undefined);
  const [authError, setAuthError] = useState(null);
  const [authLoading, setAuthLoading] = useState(false);

  useEffect(() => {
    auth.getRedirectResult().catch(e => {
      setAuthError("로그인 실패: " + e.code);
    });
    return auth.onAuthStateChanged(u => {
      if (u && !ALLOWED_EMAILS.includes(u.email)) {
        auth.signOut();
        setUser(null);
        setAuthError("접근 권한이 없는 계정입니다.");
      } else {
        setUser(u || null);
        if (u) setAuthError(null);
      }
    });
  }, []);

  const handleGoogleLogin = () => {
    setAuthError(null);
    setAuthLoading(true);
    auth.signInWithRedirect(googleProvider)
      .catch(e => { setAuthError("로그인 실패: " + e.code); setAuthLoading(false); });
  };

  const handleAppleLogin = () => {
    setAuthError(null);
    setAuthLoading(true);
    auth.signInWithRedirect(appleProvider)
      .catch(e => { setAuthError("로그인 실패: " + e.code); setAuthLoading(false); });
  };

  if (user === undefined) {
    return (
      <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div style={{ width:32, height:32, border:"3px solid #f0ece6", borderTop:"3px solid #c0392b", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
      </div>
    );
  }
  if (!user) {
    return <LoginScreen onGoogleLogin={handleGoogleLogin} onAppleLogin={handleAppleLogin} error={authError} loading={authLoading} />;
  }
  return <App user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
